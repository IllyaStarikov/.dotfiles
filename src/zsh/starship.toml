# Starship Prompt - Production-Ready Configuration
# Optimized for performance, readability, and cross-platform use

# Prompt format - clean and informative
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$kubernetes\
$fill\
$cmd_duration\
$time\
$line_break\
$jobs\
$battery\
$status\
$character"""

# Right-side prompt (time and duration moved here for cleaner left prompt)
right_format = ""

# Continuation prompt for multi-line commands
continuation_prompt = "[вҲҷ](bright-black) "

# Global timeout for external commands (ms) - 1s is sufficient
command_timeout = 1000

# Prompt character configuration
[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"
vicmd_symbol = "[вқ®](bold green)"

# Directory configuration
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "
style = "cyan bold"
read_only = " рҹ”’"
truncation_symbol = "вҖҰ/"
home_symbol = "~"

# Show when in specific important directories
[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Projects" = "у°ІӢ "

# Git configuration - essential info only
[git_branch]
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = "вҺҮ "
style = "bold purple"
truncation_length = 20
truncation_symbol = "вҖҰ"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "="
ahead = "вҮЎ"
behind = "вҮЈ"
diverged = "вҮ•"
up_to_date = ""
untracked = "?"
stashed = 'рҹ“Ұ${count}'
modified = "!"
staged = "+"
renamed = "В»"
deleted = "вңҳ"

# Git commit - show hash when in detached HEAD state
[git_commit]
tag_disabled = false
format = '[\($hash$tag\)]($style) '
style = "bold yellow"

# Git state - show rebase/merge/cherry-pick status
[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

# Git metrics - show added/deleted lines
[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
only_nonzero_diffs = true
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

# Show command duration for slow commands
[cmd_duration]
min_time = 1000
format = "took [$duration]($style) "
style = "yellow bold"

# Username - only show when not default user or in SSH
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = false

# Hostname - only show in SSH sessions
[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "green dimmed"
trim_at = "."

# Language/Framework modules - show only when relevant
[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "рҹҗҚ "
style = "yellow bold"
pyenv_version_name = false
pyenv_prefix = ""
python_binary = ["python3", "python"]
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", "poetry.lock"]
detect_folders = ["__pycache__", ".venv", "venv"]

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = "в¬ў "
style = "green bold"
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "jsx"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]
version_format = "v${major}.${minor}"

[rust]
format = "via [$symbol($version )]($style)"
symbol = "рҹҰҖ "
style = "red bold"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml", "Cargo.lock"]
detect_folders = []
version_format = "v${major}.${minor}"

[golang]
format = "via [$symbol($version )]($style)"
symbol = "рҹҗ№ "
style = "cyan bold"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum", "go.work"]
detect_folders = []
version_format = "v${major}.${minor}"

# Docker - show only when in use
[docker_context]
format = "via [$symbol$context]($style) "
symbol = "рҹҗі "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []

# Kubernetes - show context with production warning
[kubernetes]
format = 'on [$symbol$context( \($namespace\))]($style) '
symbol = "вҳё "
style = "cyan bold"
disabled = false
detect_files = ["k8s", "Kubernetes"]
detect_folders = ["k8s", ".kube"]
detect_extensions = []

# Production context warning - red for safety
[[kubernetes.contexts]]
context_pattern = ".*prod.*"
style = "bold red"

[[kubernetes.contexts]]
context_pattern = ".*production.*"
style = "bold red"

# Fill module - pushes right content to edge
[fill]
symbol = " "

# Jobs indicator
[jobs]
symbol = "+"
style = "bold blue"
number_threshold = 1
symbol_threshold = 1
format = "[$symbol$number]($style) "

# Battery - only show when low
[battery]
full_symbol = ""
charging_symbol = "вҡЎпёҸ"
discharging_symbol = "рҹ’Җ"
unknown_symbol = "вқ“"
empty_symbol = "вқ—пёҸ"
format = "[$symbol$percentage]($style) "
disabled = false

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 30
style = "bold yellow"

# Time - optional, disabled by default
[time]
disabled = true
format = '[$time]($style) '
style = "yellow"
use_12hr = false
time_format = "%H:%M"

# Exit status - show on error
[status]
style = "bg:red"
symbol = "вң–"
success_symbol = ""
format = '[$symbol $common_meaning$signal_name$maybe_int]($style) '
map_symbol = true
disabled = false
pipestatus = true

# Performance optimizations - disable unnecessary modules
[aws]
disabled = true

[gcloud]
disabled = true

