#!/usr/bin/env bash
# Synthwave 84 Default colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#ff7edb,bg=#614d85"
set -g message-style "fg=#ff7edb,bg=#614d85"
set -g message-command-style "fg=#ff7edb,bg=#614d85"

# Pane borders
set -g pane-border-style "fg=#614d85,bg=#262335"
set -g pane-active-border-style "fg=#ff7edb,bg=#262335"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#ff7edb,bg=#262335"

# Window status styling
setw -g window-status-activity-style "fg=#ffffff,bg=#614d85"
setw -g window-status-separator ""
setw -g window-status-style "fg=#ffffff,bg=#614d85"
setw -g window-status-format "#[fg=#ffffff,bg=#614d85] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#ff7edb,bg=#262335,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#ff7edb"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#262335,bg=#fede5d,bold"
set -g copy-mode-current-match-style "fg=#262335,bg=#fe4450,bold"
set -g copy-mode-mark-style "fg=#262335,bg=#72f1b8,bold"

# Window/pane styling
set -g window-style "bg=#262335,fg=#ffffff"
set -g window-active-style "bg=#262335,fg=#ffffff"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#fede5d bold]🌕,#[fg=#ff7edb bold]🌑} #[fg=#ff7edb bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#fede5d bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#ff7edb bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#72f1b8 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#36f9f6 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
