#!/usr/bin/env bash
# GitHub Dark_Dimmed colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#539bf5,bg=#444c56"
set -g message-style "fg=#539bf5,bg=#444c56"
set -g message-command-style "fg=#539bf5,bg=#444c56"

# Pane borders
set -g pane-border-style "fg=#444c56,bg=#22272e"
set -g pane-active-border-style "fg=#539bf5,bg=#22272e"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#539bf5,bg=#22272e"

# Window status styling
setw -g window-status-activity-style "fg=#adbac7,bg=#444c56"
setw -g window-status-separator ""
setw -g window-status-style "fg=#adbac7,bg=#444c56"
setw -g window-status-format "#[fg=#adbac7,bg=#444c56] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#539bf5,bg=#22272e,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#539bf5"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#22272e,bg=#c69026,bold"
set -g copy-mode-current-match-style "fg=#22272e,bg=#f47067,bold"
set -g copy-mode-mark-style "fg=#22272e,bg=#57ab5a,bold"

# Window/pane styling
set -g window-style "bg=#22272e,fg=#adbac7"
set -g window-active-style "bg=#22272e,fg=#adbac7"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#c69026 bold]🌕,#[fg=#539bf5 bold]🌑} #[fg=#539bf5 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#c69026 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#b083f0 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#57ab5a bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#39c5cf bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
