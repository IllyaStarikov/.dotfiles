#!/usr/bin/env bash
# GitHub Dark colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#2188ff,bg=#444d56"
set -g message-style "fg=#2188ff,bg=#444d56"
set -g message-command-style "fg=#2188ff,bg=#444d56"

# Pane borders
set -g pane-border-style "fg=#444d56,bg=#24292e"
set -g pane-active-border-style "fg=#2188ff,bg=#24292e"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#2188ff,bg=#24292e"

# Window status styling
setw -g window-status-activity-style "fg=#d1d5da,bg=#444d56"
setw -g window-status-separator ""
setw -g window-status-style "fg=#d1d5da,bg=#444d56"
setw -g window-status-format "#[fg=#d1d5da,bg=#444d56] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#2188ff,bg=#24292e,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#2188ff"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#24292e,bg=#ffea7f,bold"
set -g copy-mode-current-match-style "fg=#24292e,bg=#ea4a5a,bold"
set -g copy-mode-mark-style "fg=#24292e,bg=#34d058,bold"

# Window/pane styling
set -g window-style "bg=#24292e,fg=#d1d5da"
set -g window-active-style "bg=#24292e,fg=#d1d5da"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffea7f bold]🌕,#[fg=#2188ff bold]🌑} #[fg=#2188ff bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffea7f bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#b392f0 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#34d058 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#39c5cf bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
