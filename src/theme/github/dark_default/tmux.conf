#!/usr/bin/env bash
# GitHub Dark Default colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#2f81f7,bg=#30363d"
set -g message-style "fg=#2f81f7,bg=#30363d"
set -g message-command-style "fg=#2f81f7,bg=#30363d"

# Pane borders
set -g pane-border-style "fg=#30363d,bg=#0d1117"
set -g pane-active-border-style "fg=#2f81f7,bg=#0d1117"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#2f81f7,bg=#0d1117"

# Window status styling
setw -g window-status-activity-style "fg=#e6edf3,bg=#30363d"
setw -g window-status-separator ""
setw -g window-status-style "fg=#e6edf3,bg=#30363d"
setw -g window-status-format "#[fg=#e6edf3,bg=#30363d] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#2f81f7,bg=#0d1117,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#2f81f7"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#0d1117,bg=#d29922,bold"
set -g copy-mode-current-match-style "fg=#0d1117,bg=#ff7b72,bold"
set -g copy-mode-mark-style "fg=#0d1117,bg=#3fb950,bold"

# Window/pane styling
set -g window-style "bg=#0d1117,fg=#e6edf3"
set -g window-active-style "bg=#0d1117,fg=#e6edf3"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#d29922 bold]🌕,#[fg=#2f81f7 bold]🌑} #[fg=#2f81f7 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#d29922 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#bc8cff bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#3fb950 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#39c5cf bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
