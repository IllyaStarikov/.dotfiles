#!/usr/bin/env bash
# GitHub Dark_High_Contrast colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#71b7ff,bg=#272b33"
set -g message-style "fg=#71b7ff,bg=#272b33"
set -g message-command-style "fg=#71b7ff,bg=#272b33"

# Pane borders
set -g pane-border-style "fg=#272b33,bg=#0a0c10"
set -g pane-active-border-style "fg=#71b7ff,bg=#0a0c10"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#71b7ff,bg=#0a0c10"

# Window status styling
setw -g window-status-activity-style "fg=#f0f3f6,bg=#272b33"
setw -g window-status-separator ""
setw -g window-status-style "fg=#f0f3f6,bg=#272b33"
setw -g window-status-format "#[fg=#f0f3f6,bg=#272b33] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#71b7ff,bg=#0a0c10,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#71b7ff"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#0a0c10,bg=#f0b72f,bold"
set -g copy-mode-current-match-style "fg=#0a0c10,bg=#ff9492,bold"
set -g copy-mode-mark-style "fg=#0a0c10,bg=#26cd4d,bold"

# Window/pane styling
set -g window-style "bg=#0a0c10,fg=#f0f3f6"
set -g window-active-style "bg=#0a0c10,fg=#f0f3f6"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#f0b72f bold]🌕,#[fg=#71b7ff bold]🌑} #[fg=#71b7ff bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#f0b72f bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#cb9eff bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#26cd4d bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#39c5cf bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
