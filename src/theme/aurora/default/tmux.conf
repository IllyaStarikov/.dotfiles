#!/usr/bin/env bash
# Aurora colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#be9af7,bg=#4f4764"
set -g message-style "fg=#be9af7,bg=#4f4764"
set -g message-command-style "fg=#be9af7,bg=#4f4764"

# Pane borders
set -g pane-border-style "fg=#4f4764,bg=#282c34"
set -g pane-active-border-style "fg=#be9af7,bg=#282c34"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#be9af7,bg=#282c34"

# Window status styling
setw -g window-status-activity-style "fg=#a9b1d6,bg=#4f4764"
setw -g window-status-separator ""
setw -g window-status-style "fg=#a9b1d6,bg=#4f4764"
setw -g window-status-format "#[fg=#a9b1d6,bg=#4f4764] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#be9af7,bg=#282c34,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#be9af7"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#282c34,bg=#ecc48d,bold"
set -g copy-mode-current-match-style "fg=#282c34,bg=#ff5874,bold"
set -g copy-mode-mark-style "fg=#282c34,bg=#addb67,bold"

# Window/pane styling
set -g window-style "bg=#282c34,fg=#a9b1d6"
set -g window-active-style "bg=#282c34,fg=#a9b1d6"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ecc48d bold]🌕,#[fg=#be9af7 bold]🌑} #[fg=#be9af7 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ecc48d bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#be9af7 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#addb67 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#a1efe4 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
