#!/usr/bin/env bash
# Embark colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#91ddff,bg=#585273"
set -g message-style "fg=#91ddff,bg=#585273"
set -g message-command-style "fg=#91ddff,bg=#585273"

# Pane borders
set -g pane-border-style "fg=#585273,bg=#1e1c31"
set -g pane-active-border-style "fg=#91ddff,bg=#1e1c31"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#91ddff,bg=#1e1c31"

# Window status styling
setw -g window-status-activity-style "fg=#cbe3e7,bg=#585273"
setw -g window-status-separator ""
setw -g window-status-style "fg=#cbe3e7,bg=#585273"
setw -g window-status-format "#[fg=#cbe3e7,bg=#585273] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#91ddff,bg=#1e1c31,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#91ddff"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#1e1c31,bg=#ffe6b3,bold"
set -g copy-mode-current-match-style "fg=#1e1c31,bg=#f0719b,bold"
set -g copy-mode-mark-style "fg=#1e1c31,bg=#a1efd3,bold"

# Window/pane styling
set -g window-style "bg=#1e1c31,fg=#cbe3e7"
set -g window-active-style "bg=#1e1c31,fg=#cbe3e7"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffe6b3 bold]🌕,#[fg=#91ddff bold]🌑} #[fg=#91ddff bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffe6b3 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#d4bfff bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a1efd3 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#abf8f7 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
