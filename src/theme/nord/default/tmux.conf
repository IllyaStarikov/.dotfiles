#!/usr/bin/env bash
# Nord colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#88c0d0,bg=#4c566a"
set -g message-style "fg=#88c0d0,bg=#4c566a"
set -g message-command-style "fg=#88c0d0,bg=#4c566a"

# Pane borders
set -g pane-border-style "fg=#4c566a,bg=#2e3440"
set -g pane-active-border-style "fg=#88c0d0,bg=#2e3440"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#88c0d0,bg=#2e3440"

# Window status styling
setw -g window-status-activity-style "fg=#d8dee9,bg=#4c566a"
setw -g window-status-separator ""
setw -g window-status-style "fg=#d8dee9,bg=#4c566a"
setw -g window-status-format "#[fg=#d8dee9,bg=#4c566a] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#88c0d0,bg=#2e3440,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#88c0d0"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#2e3440,bg=#ebcb8b,bold"
set -g copy-mode-current-match-style "fg=#2e3440,bg=#bf616a,bold"
set -g copy-mode-mark-style "fg=#2e3440,bg=#a3be8c,bold"

# Window/pane styling
set -g window-style "bg=#2e3440,fg=#d8dee9"
set -g window-active-style "bg=#2e3440,fg=#d8dee9"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ebcb8b bold]🌕,#[fg=#88c0d0 bold]🌑} #[fg=#88c0d0 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ebcb8b bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#b48ead bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a3be8c bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#88c0d0 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
