#!/usr/bin/env bash
# Ayu Dark colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#39bae6,bg=#3e4451"
set -g message-style "fg=#39bae6,bg=#3e4451"
set -g message-command-style "fg=#39bae6,bg=#3e4451"

# Pane borders
set -g pane-border-style "fg=#3e4451,bg=#0d1017"
set -g pane-active-border-style "fg=#39bae6,bg=#0d1017"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#39bae6,bg=#0d1017"

# Window status styling
setw -g window-status-activity-style "fg=#bfbdb6,bg=#3e4451"
setw -g window-status-separator ""
setw -g window-status-style "fg=#bfbdb6,bg=#3e4451"
setw -g window-status-format "#[fg=#bfbdb6,bg=#3e4451] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#39bae6,bg=#0d1017,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#39bae6"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#0d1017,bg=#ffb454,bold"
set -g copy-mode-current-match-style "fg=#0d1017,bg=#f07178,bold"
set -g copy-mode-mark-style "fg=#0d1017,bg=#aad94c,bold"

# Window/pane styling
set -g window-style "bg=#0d1017,fg=#bfbdb6"
set -g window-active-style "bg=#0d1017,fg=#bfbdb6"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffb454 bold]🌕,#[fg=#39bae6 bold]🌑} #[fg=#39bae6 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffb454 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#d2a6ff bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#aad94c bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#95e6cb bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
