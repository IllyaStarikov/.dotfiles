#!/usr/bin/env bash
# Ayu Mirage colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#73d0ff,bg=#707a8c"
set -g message-style "fg=#73d0ff,bg=#707a8c"
set -g message-command-style "fg=#73d0ff,bg=#707a8c"

# Pane borders
set -g pane-border-style "fg=#707a8c,bg=#1f2430"
set -g pane-active-border-style "fg=#73d0ff,bg=#1f2430"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#73d0ff,bg=#1f2430"

# Window status styling
setw -g window-status-activity-style "fg=#cbccc6,bg=#707a8c"
setw -g window-status-separator ""
setw -g window-status-style "fg=#cbccc6,bg=#707a8c"
setw -g window-status-format "#[fg=#cbccc6,bg=#707a8c] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#73d0ff,bg=#1f2430,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#73d0ff"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#1f2430,bg=#ffd580,bold"
set -g copy-mode-current-match-style "fg=#1f2430,bg=#f28779,bold"
set -g copy-mode-mark-style "fg=#1f2430,bg=#bbd684,bold"

# Window/pane styling
set -g window-style "bg=#1f2430,fg=#cbccc6"
set -g window-active-style "bg=#1f2430,fg=#cbccc6"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffd580 bold]🌕,#[fg=#73d0ff bold]🌑} #[fg=#73d0ff bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffd580 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#d4bfff bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#bbd684 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#95e6cb bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
