#!/usr/bin/env bash
# Ayu Light colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#36a3d9,bg=#d9d9d9"
set -g message-style "fg=#36a3d9,bg=#d9d9d9"
set -g message-command-style "fg=#36a3d9,bg=#d9d9d9"

# Pane borders
set -g pane-border-style "fg=#d9d9d9,bg=#fafafa"
set -g pane-active-border-style "fg=#36a3d9,bg=#fafafa"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#36a3d9,bg=#fafafa"

# Window status styling
setw -g window-status-activity-style "fg=#575f66,bg=#d9d9d9"
setw -g window-status-separator ""
setw -g window-status-style "fg=#575f66,bg=#d9d9d9"
setw -g window-status-format "#[fg=#575f66,bg=#d9d9d9] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#36a3d9,bg=#fafafa,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#36a3d9"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#fafafa,bg=#f29718,bold"
set -g copy-mode-current-match-style "fg=#fafafa,bg=#f51818,bold"
set -g copy-mode-mark-style "fg=#fafafa,bg=#86b300,bold"

# Window/pane styling
set -g window-style "bg=#fafafa,fg=#575f66"
set -g window-active-style "bg=#fafafa,fg=#575f66"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#f29718 bold]🌕,#[fg=#36a3d9 bold]🌑} #[fg=#36a3d9 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#f29718 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#a37acc bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#86b300 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#4cbf99 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
