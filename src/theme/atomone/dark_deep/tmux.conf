#!/usr/bin/env bash
# OneDark Deep colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#41a7fc,bg=#455574"
set -g message-style "fg=#41a7fc,bg=#455574"
set -g message-command-style "fg=#41a7fc,bg=#455574"

# Pane borders
set -g pane-border-style "fg=#455574,bg=#1a212e"
set -g pane-active-border-style "fg=#41a7fc,bg=#1a212e"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#41a7fc,bg=#1a212e"

# Window status styling
setw -g window-status-activity-style "fg=#93a4c3,bg=#455574"
setw -g window-status-separator ""
setw -g window-status-style "fg=#93a4c3,bg=#455574"
setw -g window-status-format "#[fg=#93a4c3,bg=#455574] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#41a7fc,bg=#1a212e,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#41a7fc"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#1a212e,bg=#efbd5d,bold"
set -g copy-mode-current-match-style "fg=#1a212e,bg=#f65866,bold"
set -g copy-mode-mark-style "fg=#1a212e,bg=#8bcd5b,bold"

# Window/pane styling
set -g window-style "bg=#1a212e,fg=#93a4c3"
set -g window-active-style "bg=#1a212e,fg=#93a4c3"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#efbd5d bold]🌕,#[fg=#41a7fc bold]🌑} #[fg=#41a7fc bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#efbd5d bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#c75ae8 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#8bcd5b bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#34bfd0 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
