#!/usr/bin/env bash
# Atom One Light colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#4078f2,bg=#d0d0d1"
set -g message-style "fg=#4078f2,bg=#d0d0d1"
set -g message-command-style "fg=#4078f2,bg=#d0d0d1"

# Pane borders
set -g pane-border-style "fg=#d0d0d1,bg=#fafafa"
set -g pane-active-border-style "fg=#4078f2,bg=#fafafa"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#4078f2,bg=#fafafa"

# Window status styling
setw -g window-status-activity-style "fg=#383a42,bg=#d0d0d1"
setw -g window-status-separator ""
setw -g window-status-style "fg=#383a42,bg=#d0d0d1"
setw -g window-status-format "#[fg=#383a42,bg=#d0d0d1] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#4078f2,bg=#fafafa,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#4078f2"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#fafafa,bg=#c18401,bold"
set -g copy-mode-current-match-style "fg=#fafafa,bg=#e45649,bold"
set -g copy-mode-mark-style "fg=#fafafa,bg=#50a14f,bold"

# Window/pane styling
set -g window-style "bg=#fafafa,fg=#383a42"
set -g window-active-style "bg=#fafafa,fg=#383a42"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#c18401 bold]🌕,#[fg=#4078f2 bold]🌑} #[fg=#4078f2 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#c18401 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#a626a4 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#50a14f bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#0184bc bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
