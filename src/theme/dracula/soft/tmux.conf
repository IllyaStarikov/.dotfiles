#!/usr/bin/env bash
# Dracula Soft colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#b39ddb,bg=#44475a"
set -g message-style "fg=#b39ddb,bg=#44475a"
set -g message-command-style "fg=#b39ddb,bg=#44475a"

# Pane borders
set -g pane-border-style "fg=#44475a,bg=#282a36"
set -g pane-active-border-style "fg=#b39ddb,bg=#282a36"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#b39ddb,bg=#282a36"

# Window status styling
setw -g window-status-activity-style "fg=#f8f8f2,bg=#44475a"
setw -g window-status-separator ""
setw -g window-status-style "fg=#f8f8f2,bg=#44475a"
setw -g window-status-format "#[fg=#f8f8f2,bg=#44475a] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#b39ddb,bg=#282a36,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#b39ddb"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#282a36,bg=#f0e68c,bold"
set -g copy-mode-current-match-style "fg=#282a36,bg=#f08080,bold"
set -g copy-mode-mark-style "fg=#282a36,bg=#90ee90,bold"

# Window/pane styling
set -g window-style "bg=#282a36,fg=#f8f8f2"
set -g window-active-style "bg=#282a36,fg=#f8f8f2"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#f0e68c bold]🌕,#[fg=#b39ddb bold]🌑} #[fg=#b39ddb bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#f0e68c bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#dda0dd bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#90ee90 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#87ceeb bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
