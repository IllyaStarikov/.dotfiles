#!/usr/bin/env bash
# Iceberg Dark colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#84a0c6,bg=#3d435c"
set -g message-style "fg=#84a0c6,bg=#3d435c"
set -g message-command-style "fg=#84a0c6,bg=#3d435c"

# Pane borders
set -g pane-border-style "fg=#3d435c,bg=#161821"
set -g pane-active-border-style "fg=#84a0c6,bg=#161821"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#84a0c6,bg=#161821"

# Window status styling
setw -g window-status-activity-style "fg=#c6c8d1,bg=#3d435c"
setw -g window-status-separator ""
setw -g window-status-style "fg=#c6c8d1,bg=#3d435c"
setw -g window-status-format "#[fg=#c6c8d1,bg=#3d435c] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#84a0c6,bg=#161821,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#84a0c6"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#161821,bg=#e2a478,bold"
set -g copy-mode-current-match-style "fg=#161821,bg=#e27878,bold"
set -g copy-mode-mark-style "fg=#161821,bg=#b4be82,bold"

# Window/pane styling
set -g window-style "bg=#161821,fg=#c6c8d1"
set -g window-active-style "bg=#161821,fg=#c6c8d1"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#e2a478 bold]🌕,#[fg=#84a0c6 bold]🌑} #[fg=#84a0c6 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#e2a478 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#a093c7 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#b4be82 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#89b8c2 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
