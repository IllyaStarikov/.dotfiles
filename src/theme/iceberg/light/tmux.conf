#!/usr/bin/env bash
# Iceberg Light colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#2d539e,bg=#b8bcc7"
set -g message-style "fg=#2d539e,bg=#b8bcc7"
set -g message-command-style "fg=#2d539e,bg=#b8bcc7"

# Pane borders
set -g pane-border-style "fg=#b8bcc7,bg=#e8e9ec"
set -g pane-active-border-style "fg=#2d539e,bg=#e8e9ec"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#2d539e,bg=#e8e9ec"

# Window status styling
setw -g window-status-activity-style "fg=#33374c,bg=#b8bcc7"
setw -g window-status-separator ""
setw -g window-status-style "fg=#33374c,bg=#b8bcc7"
setw -g window-status-format "#[fg=#33374c,bg=#b8bcc7] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#2d539e,bg=#e8e9ec,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#2d539e"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#e8e9ec,bg=#c57339,bold"
set -g copy-mode-current-match-style "fg=#e8e9ec,bg=#cc517a,bold"
set -g copy-mode-mark-style "fg=#e8e9ec,bg=#668e3d,bold"

# Window/pane styling
set -g window-style "bg=#e8e9ec,fg=#33374c"
set -g window-active-style "bg=#e8e9ec,fg=#33374c"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#c57339 bold]🌕,#[fg=#2d539e bold]🌑} #[fg=#2d539e bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#c57339 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#7759b4 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#668e3d bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#3f83a6 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
