#!/usr/bin/env bash
# Catppuccin Frappe colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#8caaee,bg=#51576d"
set -g message-style "fg=#8caaee,bg=#51576d"
set -g message-command-style "fg=#8caaee,bg=#51576d"

# Pane borders
set -g pane-border-style "fg=#51576d,bg=#303446"
set -g pane-active-border-style "fg=#8caaee,bg=#303446"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#8caaee,bg=#303446"

# Window status styling
setw -g window-status-activity-style "fg=#c6d0f5,bg=#51576d"
setw -g window-status-separator ""
setw -g window-status-style "fg=#c6d0f5,bg=#51576d"
setw -g window-status-format "#[fg=#c6d0f5,bg=#51576d] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#8caaee,bg=#303446,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#8caaee"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#303446,bg=#e5c890,bold"
set -g copy-mode-current-match-style "fg=#303446,bg=#e78284,bold"
set -g copy-mode-mark-style "fg=#303446,bg=#a6d189,bold"

# Window/pane styling
set -g window-style "bg=#303446,fg=#c6d0f5"
set -g window-active-style "bg=#303446,fg=#c6d0f5"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#e5c890 bold]🌕,#[fg=#8caaee bold]🌑} #[fg=#8caaee bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#e5c890 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#f4b8e4 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a6d189 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#81c8be bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
