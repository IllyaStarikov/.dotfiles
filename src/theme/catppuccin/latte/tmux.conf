#!/usr/bin/env bash
# Catppuccin Latte colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#1e66f5,bg=#bcc0cc"
set -g message-style "fg=#1e66f5,bg=#bcc0cc"
set -g message-command-style "fg=#1e66f5,bg=#bcc0cc"

# Pane borders
set -g pane-border-style "fg=#bcc0cc,bg=#eff1f5"
set -g pane-active-border-style "fg=#1e66f5,bg=#eff1f5"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#1e66f5,bg=#eff1f5"

# Window status styling
setw -g window-status-activity-style "fg=#4c4f69,bg=#bcc0cc"
setw -g window-status-separator ""
setw -g window-status-style "fg=#4c4f69,bg=#bcc0cc"
setw -g window-status-format "#[fg=#4c4f69,bg=#bcc0cc] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#1e66f5,bg=#eff1f5,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#1e66f5"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#eff1f5,bg=#df8e1d,bold"
set -g copy-mode-current-match-style "fg=#eff1f5,bg=#d20f39,bold"
set -g copy-mode-mark-style "fg=#eff1f5,bg=#40a02b,bold"

# Window/pane styling
set -g window-style "bg=#eff1f5,fg=#4c4f69"
set -g window-active-style "bg=#eff1f5,fg=#4c4f69"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#df8e1d bold]🌕,#[fg=#1e66f5 bold]🌑} #[fg=#1e66f5 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#df8e1d bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#ea76cb bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#40a02b bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#179299 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
