#!/usr/bin/env bash
# Catppuccin Mocha colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#89b4fa,bg=#45475a"
set -g message-style "fg=#89b4fa,bg=#45475a"
set -g message-command-style "fg=#89b4fa,bg=#45475a"

# Pane borders
set -g pane-border-style "fg=#45475a,bg=#1e1e2e"
set -g pane-active-border-style "fg=#89b4fa,bg=#1e1e2e"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#89b4fa,bg=#1e1e2e"

# Window status styling
setw -g window-status-activity-style "fg=#cdd6f4,bg=#45475a"
setw -g window-status-separator ""
setw -g window-status-style "fg=#cdd6f4,bg=#45475a"
setw -g window-status-format "#[fg=#cdd6f4,bg=#45475a] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#89b4fa,bg=#1e1e2e,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#89b4fa"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#1e1e2e,bg=#f9e2af,bold"
set -g copy-mode-current-match-style "fg=#1e1e2e,bg=#f38ba8,bold"
set -g copy-mode-mark-style "fg=#1e1e2e,bg=#a6e3a1,bold"

# Window/pane styling
set -g window-style "bg=#1e1e2e,fg=#cdd6f4"
set -g window-active-style "bg=#1e1e2e,fg=#cdd6f4"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#f9e2af bold]🌕,#[fg=#89b4fa bold]🌑} #[fg=#89b4fa bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#f9e2af bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#f5c2e7 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a6e3a1 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#94e2d5 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
