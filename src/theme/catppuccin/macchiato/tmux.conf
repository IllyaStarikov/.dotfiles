#!/usr/bin/env bash
# Catppuccin Macchiato colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#8aadf4,bg=#494d64"
set -g message-style "fg=#8aadf4,bg=#494d64"
set -g message-command-style "fg=#8aadf4,bg=#494d64"

# Pane borders
set -g pane-border-style "fg=#494d64,bg=#24273a"
set -g pane-active-border-style "fg=#8aadf4,bg=#24273a"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#8aadf4,bg=#24273a"

# Window status styling
setw -g window-status-activity-style "fg=#cad3f5,bg=#494d64"
setw -g window-status-separator ""
setw -g window-status-style "fg=#cad3f5,bg=#494d64"
setw -g window-status-format "#[fg=#cad3f5,bg=#494d64] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#8aadf4,bg=#24273a,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#8aadf4"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#24273a,bg=#eed49f,bold"
set -g copy-mode-current-match-style "fg=#24273a,bg=#ed8796,bold"
set -g copy-mode-mark-style "fg=#24273a,bg=#a6da95,bold"

# Window/pane styling
set -g window-style "bg=#24273a,fg=#cad3f5"
set -g window-active-style "bg=#24273a,fg=#cad3f5"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#eed49f bold]🌕,#[fg=#8aadf4 bold]🌑} #[fg=#8aadf4 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#eed49f bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#f5bde6 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a6da95 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#8bd5ca bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
