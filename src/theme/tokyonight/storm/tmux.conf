#!/usr/bin/env bash
# Tokyo Night Storm colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#7aa2f7,bg=#3b4261"
set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"

# Pane borders
set -g pane-border-style "fg=#3b4261,bg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7,bg=#24283b"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#7aa2f7,bg=#24283b"

# Window status styling
setw -g window-status-activity-style "fg=#c0caf5,bg=#3b4261"
setw -g window-status-separator ""
setw -g window-status-style "fg=#c0caf5,bg=#3b4261"
setw -g window-status-format "#[fg=#c0caf5,bg=#3b4261] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#7aa2f7,bg=#24283b,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#7aa2f7"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#24283b,bg=#e0af68,bold"
set -g copy-mode-current-match-style "fg=#24283b,bg=#f7768e,bold"
set -g copy-mode-mark-style "fg=#24283b,bg=#9ece6a,bold"

# Window/pane styling
set -g window-style "bg=#24283b,fg=#c0caf5"
set -g window-active-style "bg=#24283b,fg=#c0caf5"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#e0af68 bold]🌕,#[fg=#7aa2f7 bold]🌑} #[fg=#7aa2f7 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#e0af68 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#bb9af7 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#9ece6a bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#7dcfff bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
