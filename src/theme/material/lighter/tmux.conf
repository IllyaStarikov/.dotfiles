#!/usr/bin/env bash
# Material Lighter colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#7c4dff,bg=#ccd7da"
set -g message-style "fg=#7c4dff,bg=#ccd7da"
set -g message-command-style "fg=#7c4dff,bg=#ccd7da"

# Pane borders
set -g pane-border-style "fg=#ccd7da,bg=#fafafa"
set -g pane-active-border-style "fg=#7c4dff,bg=#fafafa"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#7c4dff,bg=#fafafa"

# Window status styling
setw -g window-status-activity-style "fg=#546e7a,bg=#ccd7da"
setw -g window-status-separator ""
setw -g window-status-style "fg=#546e7a,bg=#ccd7da"
setw -g window-status-format "#[fg=#546e7a,bg=#ccd7da] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#7c4dff,bg=#fafafa,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#7c4dff"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#fafafa,bg=#f6a434,bold"
set -g copy-mode-current-match-style "fg=#fafafa,bg=#ff5370,bold"
set -g copy-mode-mark-style "fg=#fafafa,bg=#91b859,bold"

# Window/pane styling
set -g window-style "bg=#fafafa,fg=#546e7a"
set -g window-active-style "bg=#fafafa,fg=#546e7a"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#f6a434 bold]🌕,#[fg=#7c4dff bold]🌑} #[fg=#7c4dff bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#f6a434 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#7c4dff bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#91b859 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#39adb5 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
