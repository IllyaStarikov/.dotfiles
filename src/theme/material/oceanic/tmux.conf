#!/usr/bin/env bash
# Material Oceanic colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#11bba3,bg=#355058"
set -g message-style "fg=#11bba3,bg=#355058"
set -g message-command-style "fg=#11bba3,bg=#355058"

# Pane borders
set -g pane-border-style "fg=#355058,bg=#25363b"
set -g pane-active-border-style "fg=#11bba3,bg=#25363b"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#11bba3,bg=#25363b"

# Window status styling
setw -g window-status-activity-style "fg=#b0bec5,bg=#355058"
setw -g window-status-separator ""
setw -g window-status-style "fg=#b0bec5,bg=#355058"
setw -g window-status-format "#[fg=#b0bec5,bg=#355058] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#11bba3,bg=#25363b,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#11bba3"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#25363b,bg=#e6b455,bold"
set -g copy-mode-current-match-style "fg=#25363b,bg=#dc6068,bold"
set -g copy-mode-mark-style "fg=#25363b,bg=#abcf76,bold"

# Window/pane styling
set -g window-style "bg=#25363b,fg=#b0bec5"
set -g window-active-style "bg=#25363b,fg=#b0bec5"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffcb6b bold]🌕,#[fg=#11bba3 bold]🌑} #[fg=#11bba3 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#e6b455 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#b480d6 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#abcf76 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#71c6e7 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
