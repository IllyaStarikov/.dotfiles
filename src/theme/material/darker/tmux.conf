#!/usr/bin/env bash
# Material Darker colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#ff5370,bg=#4a4a4a"
set -g message-style "fg=#ff5370,bg=#4a4a4a"
set -g message-command-style "fg=#ff5370,bg=#4a4a4a"

# Pane borders
set -g pane-border-style "fg=#4a4a4a,bg=#212121"
set -g pane-active-border-style "fg=#ff5370,bg=#212121"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#ff5370,bg=#212121"

# Window status styling
setw -g window-status-activity-style "fg=#eeffff,bg=#4a4a4a"
setw -g window-status-separator ""
setw -g window-status-style "fg=#eeffff,bg=#4a4a4a"
setw -g window-status-format "#[fg=#eeffff,bg=#4a4a4a] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#ff5370,bg=#212121,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#ff5370"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#212121,bg=#ffcb6b,bold"
set -g copy-mode-current-match-style "fg=#212121,bg=#ff5370,bold"
set -g copy-mode-mark-style "fg=#212121,bg=#c3e88d,bold"

# Window/pane styling
set -g window-style "bg=#212121,fg=#eeffff"
set -g window-active-style "bg=#212121,fg=#eeffff"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffcb6b bold]🌕,#[fg=#ff5370 bold]🌑} #[fg=#ff5370 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffcb6b bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#c792ea bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#c3e88d bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#89ddff bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
