#!/usr/bin/env bash
# Material Palenight colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#c792ea,bg=#676e95"
set -g message-style "fg=#c792ea,bg=#676e95"
set -g message-command-style "fg=#c792ea,bg=#676e95"

# Pane borders
set -g pane-border-style "fg=#676e95,bg=#292d3e"
set -g pane-active-border-style "fg=#c792ea,bg=#292d3e"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#c792ea,bg=#292d3e"

# Window status styling
setw -g window-status-activity-style "fg=#a6accd,bg=#676e95"
setw -g window-status-separator ""
setw -g window-status-style "fg=#a6accd,bg=#676e95"
setw -g window-status-format "#[fg=#a6accd,bg=#676e95] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#c792ea,bg=#292d3e,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#c792ea"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#292d3e,bg=#ffcb6b,bold"
set -g copy-mode-current-match-style "fg=#292d3e,bg=#f07178,bold"
set -g copy-mode-mark-style "fg=#292d3e,bg=#c3e88d,bold"

# Window/pane styling
set -g window-style "bg=#292d3e,fg=#a6accd"
set -g window-active-style "bg=#292d3e,fg=#a6accd"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffcb6b bold]🌕,#[fg=#c792ea bold]🌑} #[fg=#c792ea bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffcb6b bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#c792ea bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#c3e88d bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#89ddff bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
