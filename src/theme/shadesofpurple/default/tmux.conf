#!/usr/bin/env bash
# Shades of Purple Default colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#fad000,bg=#3d3d5c"
set -g message-style "fg=#fad000,bg=#3d3d5c"
set -g message-command-style "fg=#fad000,bg=#3d3d5c"

# Pane borders
set -g pane-border-style "fg=#3d3d5c,bg=#1e1e3f"
set -g pane-active-border-style "fg=#fad000,bg=#1e1e3f"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#fad000,bg=#1e1e3f"

# Window status styling
setw -g window-status-activity-style "fg=#fafafa,bg=#3d3d5c"
setw -g window-status-separator ""
setw -g window-status-style "fg=#fafafa,bg=#3d3d5c"
setw -g window-status-format "#[fg=#fafafa,bg=#3d3d5c] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#fad000,bg=#1e1e3f,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#fad000"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#1e1e3f,bg=#ffdd00,bold"
set -g copy-mode-current-match-style "fg=#1e1e3f,bg=#ff628c,bold"
set -g copy-mode-mark-style "fg=#1e1e3f,bg=#a5ff90,bold"

# Window/pane styling
set -g window-style "bg=#1e1e3f,fg=#fafafa"
set -g window-active-style "bg=#1e1e3f,fg=#fafafa"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffdd00 bold]🌕,#[fg=#fad000 bold]🌑} #[fg=#fad000 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffdd00 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#fad000 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a5ff90 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#80ffea bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
