#!/usr/bin/env bash
# Monokai Classic colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#66d9ef,bg=#64645e"
set -g message-style "fg=#66d9ef,bg=#64645e"
set -g message-command-style "fg=#66d9ef,bg=#64645e"

# Pane borders
set -g pane-border-style "fg=#64645e,bg=#272822"
set -g pane-active-border-style "fg=#66d9ef,bg=#272822"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#66d9ef,bg=#272822"

# Window status styling
setw -g window-status-activity-style "fg=#f8f8f2,bg=#64645e"
setw -g window-status-separator ""
setw -g window-status-style "fg=#f8f8f2,bg=#64645e"
setw -g window-status-format "#[fg=#f8f8f2,bg=#64645e] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#66d9ef,bg=#272822,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#66d9ef"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#272822,bg=#e6db74,bold"
set -g copy-mode-current-match-style "fg=#272822,bg=#f92672,bold"
set -g copy-mode-mark-style "fg=#272822,bg=#a6e22e,bold"

# Window/pane styling
set -g window-style "bg=#272822,fg=#f8f8f2"
set -g window-active-style "bg=#272822,fg=#f8f8f2"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#e6db74 bold]🌕,#[fg=#66d9ef bold]🌑} #[fg=#66d9ef bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#e6db74 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#ae81ff bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a6e22e bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#a1efe4 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
