#!/usr/bin/env bash
# {{THEME_NAME}} colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg={{accent}},bg={{border}}"
set -g message-style "fg={{accent}},bg={{border}}"
set -g message-command-style "fg={{accent}},bg={{border}}"

# Pane borders
set -g pane-border-style "fg={{border}},bg={{bg}}"
set -g pane-active-border-style "fg={{accent}},bg={{bg}}"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg={{accent}},bg={{bg}}"

# Window status styling
setw -g window-status-activity-style "fg={{fg}},bg={{border}}"
setw -g window-status-separator ""
setw -g window-status-style "fg={{fg}},bg={{border}}"
setw -g window-status-format "#[fg={{fg}},bg={{border}}] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg={{accent}},bg={{bg}},bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "{{accent}}"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg={{bg}},bg={{yellow}},bold"
set -g copy-mode-current-match-style "fg={{bg}},bg={{red}},bold"
set -g copy-mode-mark-style "fg={{bg}},bg={{green}},bold"

# Window/pane styling
set -g window-style "bg={{bg}},fg={{fg}}"
set -g window-active-style "bg={{bg}},fg={{fg}}"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg={{accent_alt}} bold]🌕,#[fg={{accent}} bold]🌑} #[fg={{accent}} bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg={{yellow}} bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg={{magenta}} bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg={{green}} bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg={{cyan}} bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
