#!/usr/bin/env bash
# Night Owl Dark colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#82aaff,bg=#1d3b53"
set -g message-style "fg=#82aaff,bg=#1d3b53"
set -g message-command-style "fg=#82aaff,bg=#1d3b53"

# Pane borders
set -g pane-border-style "fg=#1d3b53,bg=#011627"
set -g pane-active-border-style "fg=#82aaff,bg=#011627"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#82aaff,bg=#011627"

# Window status styling
setw -g window-status-activity-style "fg=#d6deeb,bg=#1d3b53"
setw -g window-status-separator ""
setw -g window-status-style "fg=#d6deeb,bg=#1d3b53"
setw -g window-status-format "#[fg=#d6deeb,bg=#1d3b53] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#82aaff,bg=#011627,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#82aaff"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#011627,bg=#addb67,bold"
set -g copy-mode-current-match-style "fg=#011627,bg=#ef5350,bold"
set -g copy-mode-mark-style "fg=#011627,bg=#22da6e,bold"

# Window/pane styling
set -g window-style "bg=#011627,fg=#d6deeb"
set -g window-active-style "bg=#011627,fg=#d6deeb"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#addb67 bold]🌕,#[fg=#82aaff bold]🌑} #[fg=#82aaff bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#addb67 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#c792ea bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#22da6e bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#21c7a8 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
