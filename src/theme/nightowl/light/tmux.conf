#!/usr/bin/env bash
# Night Owl Light colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#4876d6,bg=#e0e0e0"
set -g message-style "fg=#4876d6,bg=#e0e0e0"
set -g message-command-style "fg=#4876d6,bg=#e0e0e0"

# Pane borders
set -g pane-border-style "fg=#e0e0e0,bg=#fbfbfb"
set -g pane-active-border-style "fg=#4876d6,bg=#fbfbfb"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#4876d6,bg=#fbfbfb"

# Window status styling
setw -g window-status-activity-style "fg=#403f53,bg=#e0e0e0"
setw -g window-status-separator ""
setw -g window-status-style "fg=#403f53,bg=#e0e0e0"
setw -g window-status-format "#[fg=#403f53,bg=#e0e0e0] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#4876d6,bg=#fbfbfb,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#4876d6"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#fbfbfb,bg=#e0af02,bold"
set -g copy-mode-current-match-style "fg=#fbfbfb,bg=#de3d3b,bold"
set -g copy-mode-mark-style "fg=#fbfbfb,bg=#08916a,bold"

# Window/pane styling
set -g window-style "bg=#fbfbfb,fg=#403f53"
set -g window-active-style "bg=#fbfbfb,fg=#403f53"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#e0af02 bold]🌕,#[fg=#4876d6 bold]🌑} #[fg=#4876d6 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#e0af02 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#d6438a bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#08916a bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#2aa298 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
