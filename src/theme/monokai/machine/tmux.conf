#!/usr/bin/env bash
# Monokai Pro Machine colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#7cd5f1,bg=#6b7678"
set -g message-style "fg=#7cd5f1,bg=#6b7678"
set -g message-command-style "fg=#7cd5f1,bg=#6b7678"

# Pane borders
set -g pane-border-style "fg=#6b7678,bg=#273136"
set -g pane-active-border-style "fg=#7cd5f1,bg=#273136"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#7cd5f1,bg=#273136"

# Window status styling
setw -g window-status-activity-style "fg=#f2fffc,bg=#6b7678"
setw -g window-status-separator ""
setw -g window-status-style "fg=#f2fffc,bg=#6b7678"
setw -g window-status-format "#[fg=#f2fffc,bg=#6b7678] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#7cd5f1,bg=#273136,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#7cd5f1"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#273136,bg=#ffed72,bold"
set -g copy-mode-current-match-style "fg=#273136,bg=#ff6d7e,bold"
set -g copy-mode-mark-style "fg=#273136,bg=#a2e57b,bold"

# Window/pane styling
set -g window-style "bg=#273136,fg=#f2fffc"
set -g window-active-style "bg=#273136,fg=#f2fffc"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffed72 bold]🌕,#[fg=#7cd5f1 bold]🌑} #[fg=#7cd5f1 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffed72 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#baa0f8 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a2e57b bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#7cd5f1 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
