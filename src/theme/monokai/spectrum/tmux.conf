#!/usr/bin/env bash
# Monokai Pro Spectrum colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#5ad4e6,bg=#525053"
set -g message-style "fg=#5ad4e6,bg=#525053"
set -g message-command-style "fg=#5ad4e6,bg=#525053"

# Pane borders
set -g pane-border-style "fg=#525053,bg=#222222"
set -g pane-active-border-style "fg=#5ad4e6,bg=#222222"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#5ad4e6,bg=#222222"

# Window status styling
setw -g window-status-activity-style "fg=#f7f1ff,bg=#525053"
setw -g window-status-separator ""
setw -g window-status-style "fg=#f7f1ff,bg=#525053"
setw -g window-status-format "#[fg=#f7f1ff,bg=#525053] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#5ad4e6,bg=#222222,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#5ad4e6"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#222222,bg=#fce566,bold"
set -g copy-mode-current-match-style "fg=#222222,bg=#fc618d,bold"
set -g copy-mode-mark-style "fg=#222222,bg=#7bd88f,bold"

# Window/pane styling
set -g window-style "bg=#222222,fg=#f7f1ff"
set -g window-active-style "bg=#222222,fg=#f7f1ff"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#fce566 bold]🌕,#[fg=#5ad4e6 bold]🌑} #[fg=#5ad4e6 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#fce566 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#948ae3 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#7bd88f bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#5ad4e6 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
