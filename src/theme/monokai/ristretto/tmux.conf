#!/usr/bin/env bash
# Monokai Pro Ristretto colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#f38d70,bg=#72696a"
set -g message-style "fg=#f38d70,bg=#72696a"
set -g message-command-style "fg=#f38d70,bg=#72696a"

# Pane borders
set -g pane-border-style "fg=#72696a,bg=#2c2525"
set -g pane-active-border-style "fg=#f38d70,bg=#2c2525"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#f38d70,bg=#2c2525"

# Window status styling
setw -g window-status-activity-style "fg=#fff1f3,bg=#72696a"
setw -g window-status-separator ""
setw -g window-status-style "fg=#fff1f3,bg=#72696a"
setw -g window-status-format "#[fg=#fff1f3,bg=#72696a] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#f38d70,bg=#2c2525,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#f38d70"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#2c2525,bg=#f9cc6c,bold"
set -g copy-mode-current-match-style "fg=#2c2525,bg=#fd6883,bold"
set -g copy-mode-mark-style "fg=#2c2525,bg=#adda78,bold"

# Window/pane styling
set -g window-style "bg=#2c2525,fg=#fff1f3"
set -g window-active-style "bg=#2c2525,fg=#fff1f3"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#f9cc6c bold]🌕,#[fg=#f38d70 bold]🌑} #[fg=#f38d70 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#f9cc6c bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#a8a9eb bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#adda78 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#85dacc bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
