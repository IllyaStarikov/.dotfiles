#!/usr/bin/env bash
# Monokai Pro Octagon colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#ff9b5e,bg=#696d77"
set -g message-style "fg=#ff9b5e,bg=#696d77"
set -g message-command-style "fg=#ff9b5e,bg=#696d77"

# Pane borders
set -g pane-border-style "fg=#696d77,bg=#282a3a"
set -g pane-active-border-style "fg=#ff9b5e,bg=#282a3a"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#ff9b5e,bg=#282a3a"

# Window status styling
setw -g window-status-activity-style "fg=#eaf2f1,bg=#696d77"
setw -g window-status-separator ""
setw -g window-status-style "fg=#eaf2f1,bg=#696d77"
setw -g window-status-format "#[fg=#eaf2f1,bg=#696d77] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#ff9b5e,bg=#282a3a,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#ff9b5e"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#282a3a,bg=#ffd76d,bold"
set -g copy-mode-current-match-style "fg=#282a3a,bg=#ff657a,bold"
set -g copy-mode-mark-style "fg=#282a3a,bg=#bad761,bold"

# Window/pane styling
set -g window-style "bg=#282a3a,fg=#eaf2f1"
set -g window-active-style "bg=#282a3a,fg=#eaf2f1"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffd76d bold]🌕,#[fg=#ff9b5e bold]🌑} #[fg=#ff9b5e bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffd76d bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#c39ac9 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#bad761 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#9cd1bb bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
