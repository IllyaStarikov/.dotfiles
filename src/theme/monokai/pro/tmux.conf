#!/usr/bin/env bash
# Monokai Pro Pro colors for tmux
# Generated from template - do not edit directly

# Mode and messages
set -g mode-style "fg=#ffd866,bg=#403e41"
set -g message-style "fg=#ffd866,bg=#403e41"
set -g message-command-style "fg=#ffd866,bg=#403e41"

# Pane borders
set -g pane-border-style "fg=#403e41,bg=#2d2a2e"
set -g pane-active-border-style "fg=#ffd866,bg=#2d2a2e"

# Status bar styling
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#ffd866,bg=#2d2a2e"

# Window status styling
setw -g window-status-activity-style "fg=#fcfcfa,bg=#403e41"
setw -g window-status-separator ""
setw -g window-status-style "fg=#fcfcfa,bg=#403e41"
setw -g window-status-format "#[fg=#fcfcfa,bg=#403e41] #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[fg=#ffd866,bg=#2d2a2e,bold] #{?window_zoomed_flag,🔍 ,}#I #W "

# Clock mode
set -g clock-mode-colour "#ffd866"
set -g clock-mode-style 24

# Copy mode highlighting
set -g copy-mode-match-style "fg=#2d2a2e,bg=#ffd866,bold"
set -g copy-mode-current-match-style "fg=#2d2a2e,bg=#ff6188,bold"
set -g copy-mode-mark-style "fg=#2d2a2e,bg=#a9dc76,bold"

# Window/pane styling
set -g window-style "bg=#2d2a2e,fg=#fcfcfa"
set -g window-active-style "bg=#2d2a2e,fg=#fcfcfa"

# Status bar content
# Path stored as a tmux option so the width #{?...} conditionals below can use
# #{@dotfiles}: a literal ${DOTFILES:-~/.dotfiles} would break #{?...} brace
# matching. The main tmux.conf also sets this (and honors a $DOTFILES override);
# the static default here keeps theme.conf self-contained when sourced alone.
set -g @dotfiles "~/.dotfiles"
set -g status-left '#{?client_prefix,#[fg=#ffd866 bold]🌕,#[fg=#ffd866 bold]🌑} #[fg=#ffd866 bold]#S #[default]│ '
# Width-responsive: tabs have priority, then drop cpu (<135), memory (<110),
# battery (<90) as the terminal narrows. The clock is always shown (static).
# NOTE: inside #{?...} conditionals (a) style attrs must be space-separated not
# comma-separated (comma is the field separator), and (b) comparisons must use
# the numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=#ffd866 bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=#ab9df2 bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=#a9dc76 bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=#78dce8 bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'
