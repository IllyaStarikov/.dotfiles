# Minimal Tmux Configuration - Only What You Need
# No plugins, just built-in functionality

# Core Settings

# Better prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Basics
# History limit: see config/standards.json for canonical value
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2000
set -s escape-time 0 # instant ESC response for vim
set -g focus-events on
set -g mouse on

# True colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB,xterm-256color:RGB"
set-option -sa terminal-features ',xterm-256color:RGB'

# Undercurl (Smulx) + colored underline (Setulc) passthrough. Without these,
# tmux silently drops Neovim's curly underlines (spell check, LSP diagnostics)
# because the outer terminal's terminfo lacks the capabilities on macOS.
# All terminals in use (WezTerm, iTerm2, kitty, Alacritty) render them natively.
# NOTE: read at client attach — detach/reattach clients after reloading.
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -as terminal-features ',xterm-256color:usstyle,alacritty:usstyle,xterm-kitty:usstyle,wezterm:usstyle'

# Key Bindings - Essential Only

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind c new-window -c "#{pane_current_path}"

# Copy mode with vi bindings
setw -g mode-keys vi

# Vi-style selection bindings (CRITICAL for v/V to work!)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# Enable OSC 52 clipboard integration (works through SSH)
set -g set-clipboard on

# Declare the OSC 52 'clipboard' capability (Ms) for every outer terminal.
# set-clipboard only OFFERS OSC 52; if the outer terminal's terminfo lacks
# Ms (macOS xterm-256color does), tmux silently drops the write and copy
# intermittently no-ops. Requires tmux >= 3.2.
set -as terminal-features ',*:clipboard'

# Allow OSC sequences to pass through to terminal (for theme --local)
set -g allow-passthrough on

# Platform-specific clipboard with better performance
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'; \
   bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -i -selection clipboard 2>/dev/null || xsel -i -b 2>/dev/null || cat > /tmp/tmux-buffer'; \
   bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xclip -i -selection clipboard 2>/dev/null || xsel -i -b 2>/dev/null || cat > /tmp/tmux-buffer'; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xclip -i -selection clipboard 2>/dev/null || xsel -i -b 2>/dev/null || cat > /tmp/tmux-buffer'"

# Status Bar - Minimal
set -g status-interval 5
set -g status-position top
set -g status-left-length 30
set -g status-right-length 120

# Resolve the dotfiles path into a tmux option so status-right can reference it
# as #{@dotfiles}. A literal ${DOTFILES:-~/.dotfiles} cannot be used inside the
# width #{?...} conditionals below: its closing } prematurely ends the
# conditional (tmux brace matching). The static default works immediately; the
# backgrounded run-shell then honors a custom $DOTFILES override.
set -g @dotfiles "~/.dotfiles"
run-shell -b 'tmux set -g @dotfiles "${DOTFILES:-$HOME/.dotfiles}"'

# Left side: Session name with icon and prefix indicator
# The moon (🌑) changes to (🌕) when prefix is active
set -g status-left '#{?client_prefix,#[fg=yellow bold]🌕,#[fg=blue bold]🌑} #[fg=blue bold]#S #[default]│ '

# Right side: CPU, Memory, Battery, and time (all bold)
# Width-responsive: window tabs have priority. As the terminal narrows, drop
# cpu (<135 cols), then memory (<110), then battery (<90); the clock is always
# shown (static). Thresholds calibrated to a ~151-col full screen. NOTE: inside
# #{?...} conditionals (a) style attrs must be space-separated not comma-
# separated (comma is the field separator), and (b) comparisons must use the
# numeric form #{e|>=:...} — plain #{>=:...} compares as strings.
set -g status-right '#{?#{e|>=:#{client_width},135},#[fg=yellow bold]#(#{@dotfiles}/src/scripts/tmux-utils cpu) #[default]│ ,}#{?#{e|>=:#{client_width},110},#[fg=magenta bold]#(#{@dotfiles}/src/scripts/tmux-utils memory) #[default]│ ,}#{?#{e|>=:#{client_width},90},#[fg=green bold]#(#{@dotfiles}/src/scripts/tmux-utils battery) #[default]│ ,}#[fg=cyan bold]#(#{@dotfiles}/src/scripts/tmux-utils clock) #[default]'

# Window status formatting (set by theme, these are fallbacks)
# Icons: 🔔 bell, 📣 activity, 🔍 zoomed (only shown when active)
setw -g window-status-format " #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format "#[bold] #{?window_zoomed_flag,🔍 ,}#I #W #[default]"

# Theme Configuration

# Load dynamic theme based on system appearance
# This will be overridden by the theme file if it exists
if-shell "[ -f ~/.config/tmux/theme.conf ]" "source-file ~/.config/tmux/theme.conf" \
  "set -g status-style 'bg=#1e1e2e fg=#cdd6f4'; \
   set -g window-status-current-style 'bg=#45475a fg=#cdd6f4 bold'; \
   set -g window-status-style 'bg=#1e1e2e fg=#6c7086'; \
   set -g pane-border-style 'fg=#45475a'; \
   set -g pane-active-border-style 'fg=#89b4fa'; \
   set -g message-style 'bg=#45475a fg=#cdd6f4'"

# Activity Monitoring
setw -g monitor-activity on
set -g visual-activity off

# Bell Monitoring - visual only, no sound
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

# That's It! No Plugins Needed

# Load local overrides if they exist
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"