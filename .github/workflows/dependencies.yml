name: dependencies

on:
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    name: update dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.4
        with:
          submodules: true

      - name: update git submodules
        run: |
          echo "::group::Update submodules"
          git submodule update --init --recursive
          # actions/checkout fetches submodules shallow (--depth=1), so the
          # local commit and the fetched remote tip share no history and
          # `--merge` dies with "refusing to merge unrelated histories" (exit
          # 128). We only want to bump the gitlink to the latest remote SHA,
          # which is the default checkout behavior of --remote (no merge).
          # git status --porcelain below then sees the bump.
          git submodule update --remote

          # Check if there are changes
          if [[ -n $(git status --porcelain) ]]; then
            echo "Submodule updates available"
            echo "SUBMODULES_UPDATED=true" >> $GITHUB_ENV
          else
            echo "No submodule updates"
            echo "SUBMODULES_UPDATED=false" >> $GITHUB_ENV
          fi
          echo "::endgroup::"

      # (dependency-review-action removed: it only works on pull_request
      # events, so on this schedule/dispatch workflow it errored on every run
      # behind continue-on-error. Dependabot's github-actions ecosystem
      # already handles action updates weekly.)

      - name: check for neovim plugin updates
        run: |
          echo "::group::Check plugin updates"
          # Extract plugin URLs from Neovim config (flat layout: no
          # config/ subdirectory).
          if [[ -f "src/neovim/plugins.lua" ]]; then
            echo "Checking for plugin updates..."
            grep -oE '"[^"]+/[^"]+"' src/neovim/plugins.lua | \
              sed 's/"//g' | \
              grep -E '^[a-zA-Z0-9_-]+/[a-zA-Z0-9_.-]+$' | \
              sort -u > /tmp/plugins.txt

            echo "Found $(wc -l < /tmp/plugins.txt) plugins"

            # Check each plugin's latest release (limit to first 10 for speed)
            head -10 /tmp/plugins.txt | while read -r plugin; do
              echo -n "Checking $plugin... "
              latest=$(curl -s "https://api.github.com/repos/$plugin/releases/latest" | \
                grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' || echo "unknown")
              echo "$latest"
            done
          fi
          echo "::endgroup::"

      - name: update documentation
        run: |
          echo "::group::Update docs"
          # Update year in copyright notices
          current_year=$(date +%Y)
          find . -type f \( -name "*.md" -o -name "LICENSE" \) -exec \
            sed -i "s/Copyright.*[0-9]\{4\}/Copyright $current_year/g" {} \;

          # Update last updated date in README
          if grep -q "Last Updated:" README.md; then
            sed -i "s/Last Updated:.*/Last Updated: $(date '+%B %d, %Y')/g" README.md
          fi
          echo "::endgroup::"

      - name: check for any changes
        run: |
          # Recompute dirtiness AFTER all mutating steps: the submodule flag
          # alone silently discarded weeks where only the doc edits changed.
          if [[ -n $(git status --porcelain) ]]; then
            echo "CHANGES_PRESENT=true" >> $GITHUB_ENV
          else
            echo "CHANGES_PRESENT=false" >> $GITHUB_ENV
          fi

      - name: create pull request
        if: env.CHANGES_PRESENT == 'true'
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5 # v5.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies and submodules'
          title: '🔄 Weekly Dependency Updates'
          body: |
            ## 🔄 Automated Dependency Updates

            This PR contains the following updates:
            - Git submodules updated to latest versions
            - Documentation dates updated
            - Copyright years updated

            ### Pre-merge Checklist
            - [ ] Review submodule changes
            - [ ] Test major functionality
            - [ ] Verify no breaking changes

            ---
            *This PR was automatically created by the dependency update workflow.*
          branch: deps/weekly-update
          delete-branch: true
          labels: |
            dependencies
            automated
